<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ECOPLANT — Monitor de Invernadero</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f0a;
      --surface: #111611;
      --card: #141a14;
      --border: #1e2a1e;
      --accent: #4ade80;
      --accent2: #86efac;
      --temp: #fb923c;
      --hum: #38bdf8;
      --soil: #a3e635;
      --light: #fbbf24;
      --text: #e8f5e9;
      --muted: #6b7c6b;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 0;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--accent);
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .3s;
    }

    .dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* Layout */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Cards grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }

    .card:hover { border-color: #2a3a2a; }

    .card-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card-label {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--mono);
    }

    .card-icon {
      font-size: 20px;
      opacity: .8;
    }

    .card-value {
      font-family: var(--mono);
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
      transition: color .3s;
    }

    .card-unit {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 400;
      opacity: .5;
      margin-left: 4px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Gauge bar */
    .gauge-wrap {
      margin-top: 18px;
    }

    .gauge-track {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .gauge-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .8s cubic-bezier(.4,0,.2,1);
    }

    .gauge-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* Status indicator */
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
    }

    .status-pill {
      font-size: 11px;
      font-family: var(--mono);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: .05em;
    }

    /* Last update panel */
    .info-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .info-bar span { color: var(--text); }

    /* Grid resumen */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .summary-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .summary-color {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .summary-name {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .summary-val {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
    }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      gap: 16px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #1a0a0a;
      border: 1px solid #3a1a1a;
      border-radius: 12px;
      padding: 20px 24px;
      color: #f87171;
      font-family: var(--mono);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      main { padding: 20px 14px; }
      .card-value { font-size: 40px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🌱</div>
    <div>
      <div class="logo-text">ECOPLANT</div>
      <div class="logo-sub">Monitor de invernadero</div>
    </div>
  </div>
  <div class="status-badge">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Conectando...</span>
  </div>
</header>

<main>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      Conectando con Firebase...
    </div>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCOEp0_Gl0fHnGJhdkLBbrlxmbDZnO1WNQ",
    authDomain: "ecoplant-9876c.firebaseapp.com",
    databaseURL: "https://ecoplant-9876c-default-rtdb.firebaseio.com",
    projectId: "ecoplant-9876c",
    storageBucket: "ecoplant-9876c.firebasestorage.app",
    messagingSenderId: "168426434020",
    appId: "1:168426434020:web:c7bd3f38c865b0d6b3abf1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  function getTemp(val) {
    if (val < 15) return { label: "Frío", color: "#38bdf8", bg: "rgba(56,189,248,.1)" };
    if (val < 28) return { label: "Óptimo", color: "#4ade80", bg: "rgba(74,222,128,.1)" };
    return { label: "Caliente", color: "#fb923c", bg: "rgba(251,146,60,.1)" };
  }

  function getHumAire(val) {
    if (val < 40) return { label: "Seco", color: "#fb923c", bg: "rgba(251,146,60,.1)" };
    if (val < 70) return { label: "Óptimo", color: "#4ade80", bg: "rgba(74,222,128,.1)" };
    return { label: "Húmedo", color: "#38bdf8", bg: "rgba(56,189,248,.1)" };
  }

  function getHumSuelo(val) {
    if (val < 30) return { label: "Necesita riego", color: "#fb923c", bg: "rgba(251,146,60,.1)" };
    if (val < 70) return { label: "Óptimo", color: "#4ade80", bg: "rgba(74,222,128,.1)" };
    return { label: "Saturado", color: "#38bdf8", bg: "rgba(56,189,248,.1)" };
  }

  function getLuz(val) {
    if (val < 300) return { label: "Poca luz", color: "#fb923c", bg: "rgba(251,146,60,.1)" };
    if (val < 800) return { label: "Adecuada", color: "#4ade80", bg: "rgba(74,222,128,.1)" };
    return { label: "Intensa", color: "#fbbf24", bg: "rgba(251,191,36,.1)" };
  }

  function renderDashboard(data) {
    const temp = data.temperatura ?? "--";
    const humAire = data.humedad_aire ?? "--";
    const humSuelo = data.humedad_suelo ?? "--";
    const luz = data.luz ?? "--";

    const ts = data.timestamp
      ? new Date(data.timestamp * 1000).toLocaleString("es-CO")
      : "Ahora";

    const stT = typeof temp === "number" ? getTemp(temp) : { label: "—", color: "#6b7c6b", bg: "transparent" };
    const stHA = typeof humAire === "number" ? getHumAire(humAire) : { label: "—", color: "#6b7c6b", bg: "transparent" };
    const stHS = typeof humSuelo === "number" ? getHumSuelo(humSuelo) : { label: "—", color: "#6b7c6b", bg: "transparent" };
    const stL = typeof luz === "number" ? getLuz(luz) : { label: "—", color: "#6b7c6b", bg: "transparent" };

    const pTemp = typeof temp === "number" ? Math.min((temp / 50) * 100, 100) : 0;
    const pHA = typeof humAire === "number" ? Math.min(humAire, 100) : 0;
    const pHS = typeof humSuelo === "number" ? Math.min(humSuelo, 100) : 0;
    const pLuz = typeof luz === "number" ? Math.min((luz / 1200) * 100, 100) : 0;

    document.getElementById("statusDot").className = "dot online";
    document.getElementById("statusText").textContent = "En línea";

    document.getElementById("app").innerHTML = `
      <div class="section-label">// lecturas en tiempo real</div>

      <div class="info-bar">
        <div>Última actualización: <span>${ts}</span></div>
        <div>Proyecto: <span>ecoplant-9876c</span></div>
        <div>Sensor: <span>ESP32-S3</span></div>
      </div>

      <div class="cards">

        <!-- Temperatura -->
        <div class="card">
          <div class="card-accent" style="background:${stT.color}"></div>
          <div class="card-header">
            <div>
              <div class="card-label">Temperatura</div>
            </div>
            <div class="card-icon">🌡</div>
          </div>
          <div class="card-value" style="color:${stT.color}">
            ${typeof temp === "number" ? temp.toFixed(1) : "--"}<span class="card-unit">°C</span>
          </div>
          <div class="gauge-wrap">
            <div class="gauge-track">
              <div class="gauge-fill" style="width:${pTemp}%;background:${stT.color}"></div>
            </div>
            <div class="gauge-labels"><span>0°</span><span>25°</span><span>50°</span></div>
          </div>
          <div class="status-row">
            <div class="status-pill" style="background:${stT.bg};color:${stT.color}">${stT.label}</div>
          </div>
          <div class="card-desc">Rango óptimo para plantas: 15°C – 28°C</div>
        </div>

        <!-- Humedad del aire -->
        <div class="card">
          <div class="card-accent" style="background:${stHA.color}"></div>
          <div class="card-header">
            <div>
              <div class="card-label">Humedad del aire</div>
            </div>
            <div class="card-icon">💧</div>
          </div>
          <div class="card-value" style="color:${stHA.color}">
            ${typeof humAire === "number" ? humAire.toFixed(0) : "--"}<span class="card-unit">%</span>
          </div>
          <div class="gauge-wrap">
            <div class="gauge-track">
              <div class="gauge-fill" style="width:${pHA}%;background:${stHA.color}"></div>
            </div>
            <div class="gauge-labels"><span>0%</span><span>50%</span><span>100%</span></div>
          </div>
          <div class="status-row">
            <div class="status-pill" style="background:${stHA.bg};color:${stHA.color}">${stHA.label}</div>
          </div>
          <div class="card-desc">Rango óptimo: 40% – 70% HR</div>
        </div>

        <!-- Humedad del suelo -->
        <div class="card">
          <div class="card-accent" style="background:${stHS.color}"></div>
          <div class="card-header">
            <div>
              <div class="card-label">Humedad del suelo</div>
            </div>
            <div class="card-icon">🌱</div>
          </div>
          <div class="card-value" style="color:${stHS.color}">
            ${typeof humSuelo === "number" ? humSuelo.toFixed(0) : "--"}<span class="card-unit">%</span>
          </div>
          <div class="gauge-wrap">
            <div class="gauge-track">
              <div class="gauge-fill" style="width:${pHS}%;background:${stHS.color}"></div>
            </div>
            <div class="gauge-labels"><span>0%</span><span>50%</span><span>100%</span></div>
          </div>
          <div class="status-row">
            <div class="status-pill" style="background:${stHS.bg};color:${stHS.color}">${stHS.label}</div>
          </div>
          <div class="card-desc">Sensor capacitivo v1.2</div>
        </div>

        <!-- Luz -->
        <div class="card">
          <div class="card-accent" style="background:${stL.color}"></div>
          <div class="card-header">
            <div>
              <div class="card-label">Nivel de luz</div>
            </div>
            <div class="card-icon">☀️</div>
          </div>
          <div class="card-value" style="color:${stL.color}">
            ${typeof luz === "number" ? luz : "--"}<span class="card-unit" style="font-size:13px">lux</span>
          </div>
          <div class="gauge-wrap">
            <div class="gauge-track">
              <div class="gauge-fill" style="width:${pLuz}%;background:${stL.color}"></div>
            </div>
            <div class="gauge-labels"><span>0</span><span>600</span><span>1200</span></div>
          </div>
          <div class="status-row">
            <div class="status-pill" style="background:${stL.bg};color:${stL.color}">${stL.label}</div>
          </div>
          <div class="card-desc">Sensor LDR 5mm 5506</div>
        </div>

      </div>

      <div class="section-label">// resumen de estado</div>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-color" style="background:${stT.color}"></div>
          <div>
            <div class="summary-name">Temperatura</div>
            <div class="summary-val" style="color:${stT.color}">${stT.label}</div>
          </div>
        </div>
        <div class="summary-item">
          <div class="summary-color" style="background:${stHA.color}"></div>
          <div>
            <div class="summary-name">Humedad del aire</div>
            <div class="summary-val" style="color:${stHA.color}">${stHA.label}</div>
          </div>
        </div>
        <div class="summary-item">
          <div class="summary-color" style="background:${stHS.color}"></div>
          <div>
            <div class="summary-name">Humedad del suelo</div>
            <div class="summary-val" style="color:${stHS.color}">${stHS.label}</div>
          </div>
        </div>
        <div class="summary-item">
          <div class="summary-color" style="background:${stL.color}"></div>
          <div>
            <div class="summary-name">Nivel de luz</div>
            <div class="summary-val" style="color:${stL.color}">${stL.label}</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderError(msg) {
    document.getElementById("statusDot").className = "dot";
    document.getElementById("statusText").textContent = "Sin conexión";
    document.getElementById("app").innerHTML = `
      <div class="error-msg">
        ⚠️ Error al conectar con Firebase<br>
        <small style="opacity:.6;margin-top:6px;display:block">${msg}</small>
      </div>
    `;
  }

  try {
    const dataRef = ref(db, "ecoplant");
    onValue(dataRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        renderDashboard(data);
      } else {
        renderError("No se encontraron datos en /ecoplant. Verifica que importaste el JSON.");
      }
    }, (error) => {
      renderError(error.message);
    });
  } catch (e) {
    renderError(e.message);
  }
</script>

</body>
</html>

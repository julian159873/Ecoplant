<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ECOPLANT — Monitor de Invernadero</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#0a0f0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ECOPLANT"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f0a; --surface: #111611; --card: #141a14; --border: #1e2a1e;
      --accent: #4ade80; --text: #e8f5e9; --muted: #6b7c6b;
      --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
      --nav-h: 64px;
    }

    body.light {
      --bg: #f0f7f0; --surface: #ffffff; --card: #f8fdf8; --border: #d0e8d0;
      --accent: #16a34a; --text: #0f1f0f; --muted: #5a7a5a;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sans); min-height: 100vh;
      transition: background .3s, color .3s;
    }

    /* HEADER */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      background: var(--surface); position: sticky; top: 0; z-index: 100;
      transition: background .3s, border-color .3s;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-family: var(--mono); font-size: 15px; font-weight: 700; letter-spacing: .1em; color: var(--accent); }
    .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
    .status-badge { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); font-family: var(--mono); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background .3s; }
    .dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; z-index: 100; transition: background .3s, border-color .3s;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; padding: 12px 0;
      background: none; border: none; cursor: pointer;
      font-family: var(--sans); color: var(--muted);
      font-size: 11px; transition: color .2s; position: relative;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active::after {
      content: ''; position: absolute; top: 0; left: 20%; right: 20%;
      height: 2px; background: var(--accent); border-radius: 0 0 4px 4px;
    }
    .nav-icon { font-size: 22px; }

    /* PAGES */
    main { max-width: 900px; margin: 0 auto; padding: 24px 20px; padding-bottom: calc(var(--nav-h) + 24px); }
    .page { display: none; }
    .page.active { display: block; }

    /* SECTION LABEL */
    .section-label {
      font-family: var(--mono); font-size: 10px; letter-spacing: .15em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 18px;
    }

    /* INFO BAR */
    .info-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 18px; font-family: var(--mono);
      font-size: 11px; color: var(--muted); margin-bottom: 24px;
      flex-wrap: wrap; gap: 10px; transition: background .3s, border-color .3s;
    }
    .info-bar span { color: var(--text); }

    /* CARDS */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px; position: relative; overflow: hidden;
      transition: border-color .2s, background .3s;
    }
    .card:hover { border-color: #2a3a2a; }
    .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 16px 16px 0 0; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
    .card-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); font-family: var(--mono); }
    .card-icon { font-size: 20px; opacity: .8; }
    .card-value { font-family: var(--mono); font-size: 48px; font-weight: 700; line-height: 1; transition: color .3s; }
    .card-unit { font-family: var(--mono); font-size: 16px; font-weight: 400; opacity: .5; margin-left: 3px; }
    .card-desc { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .gauge-wrap { margin-top: 16px; }
    .gauge-track { width: 100%; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .gauge-fill { height: 100%; border-radius: 4px; transition: width .8s cubic-bezier(.4,0,.2,1); }
    .gauge-labels { display: flex; justify-content: space-between; margin-top: 5px; font-family: var(--mono); font-size: 10px; color: var(--muted); }
    .status-row { display: flex; align-items: center; gap: 6px; margin-top: 12px; }
    .status-pill { font-size: 11px; font-family: var(--mono); padding: 3px 10px; border-radius: 20px; font-weight: 700; letter-spacing: .05em; }

    /* SUMMARY */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
    .summary-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px; display: flex;
      align-items: center; gap: 10px; transition: background .3s, border-color .3s;
    }
    .summary-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .summary-name { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .summary-val { font-family: var(--mono); font-size: 14px; font-weight: 700; }

    /* SETTINGS PAGE */
    .settings-title { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
    .settings-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .setting-group {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; margin-bottom: 16px;
      transition: background .3s, border-color .3s;
    }
    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-info { display: flex; flex-direction: column; gap: 2px; }
    .setting-name { font-size: 14px; font-weight: 500; }
    .setting-desc { font-size: 12px; color: var(--muted); }

    /* TOGGLE */
    .toggle { position: relative; width: 48px; height: 26px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: var(--border);
      border-radius: 26px; transition: background .3s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 20px; height: 20px; background: #fff;
      border-radius: 50%; transition: transform .3s;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(22px); }

    /* LOADING / ERROR */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; color: var(--muted); font-family: var(--mono); font-size: 13px; gap: 16px; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: #1a0a0a; border: 1px solid #3a1a1a; border-radius: 12px; padding: 20px 24px; color: #f87171; font-family: var(--mono); font-size: 13px; text-align: center; }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      main { padding: 18px 14px; padding-bottom: calc(var(--nav-h) + 18px); }
      .card-value { font-size: 38px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="44" r="5" fill="#0a0f0a"/>
        <rect x="30.5" y="20" width="3" height="24" rx="1.5" fill="#0a0f0a"/>
        <path d="M31.5 32 Q20 28 18 16 Q30 16 31.5 32Z" fill="#0a0f0a"/>
        <path d="M32.5 26 Q44 22 46 10 Q34 10 32.5 26Z" fill="#0a0f0a" opacity=".7"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">ECOPLANT</div>
      <div class="logo-sub">Monitor de invernadero</div>
    </div>
  </div>
  <div class="status-badge">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Conectando...</span>
  </div>
</header>

<main>
  <!-- PAGE: MI PLANTA -->
  <div class="page active" id="page-planta">
    <div id="app">
      <div class="loading"><div class="spinner"></div>Conectando con Firebase...</div>
    </div>
  </div>

  <!-- PAGE: AJUSTES -->
  <div class="page" id="page-ajustes">
    <div class="settings-title">Ajustes</div>
    <div class="settings-sub">Personaliza la aplicación</div>

    <div class="setting-group">
      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-name">Modo claro</div>
          <div class="setting-desc">Cambia la interfaz entre oscuro y claro</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="themeToggle" onchange="toggleTheme(this)"/>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-name">Proyecto</div>
          <div class="setting-desc">ecoplant-9876c</div>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-name">Sensor</div>
          <div class="setting-desc">ESP32-S3</div>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-name">Versión</div>
          <div class="setting-desc">1.0.0</div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-planta" onclick="showPage('planta')">
    <span class="nav-icon">🌱</span>
    Mi Planta
  </button>
  <button class="nav-btn" id="nav-ajustes" onclick="showPage('ajustes')">
    <span class="nav-icon">⚙️</span>
    Ajustes
  </button>
</nav>

<script>
  // Navegación entre páginas
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    document.getElementById('nav-' + id).classList.add('active');
  }

  // Toggle de tema claro/oscuro
  function toggleTheme(checkbox) {
    if (checkbox.checked) {
      document.body.classList.add('light');
      localStorage.setItem('ecoplant-theme', 'light');
    } else {
      document.body.classList.remove('light');
      localStorage.setItem('ecoplant-theme', 'dark');
    }
  }

  // Restaurar tema guardado al cargar
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('ecoplant-theme');
    if (saved === 'light') {
      document.body.classList.add('light');
      const toggle = document.getElementById('themeToggle');
      if (toggle) toggle.checked = true;
    }
  });
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCOEp0_Gl0fHnGJhdkLBbrlxmbDZnO1WNQ",
    authDomain: "ecoplant-9876c.firebaseapp.com",
    databaseURL: "https://ecoplant-9876c-default-rtdb.firebaseio.com",
    projectId: "ecoplant-9876c",
    storageBucket: "ecoplant-9876c.firebasestorage.app",
    messagingSenderId: "168426434020",
    appId: "1:168426434020:web:c7bd3f38c865b0d6b3abf1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  function getTemp(v) {
    if (v < 15) return { label:"Frío", color:"#38bdf8", bg:"rgba(56,189,248,.1)" };
    if (v < 28) return { label:"Óptimo", color:"#4ade80", bg:"rgba(74,222,128,.1)" };
    return { label:"Caliente", color:"#fb923c", bg:"rgba(251,146,60,.1)" };
  }
  function getHumSuelo(v) {
    if (v < 30) return { label:"Necesita riego", color:"#fb923c", bg:"rgba(251,146,60,.1)" };
    if (v < 70) return { label:"Óptimo", color:"#4ade80", bg:"rgba(74,222,128,.1)" };
    return { label:"Saturado", color:"#38bdf8", bg:"rgba(56,189,248,.1)" };
  }
  function getLuz(v) {
    if (v < 300) return { label:"Poca luz", color:"#fb923c", bg:"rgba(251,146,60,.1)" };
    if (v < 800) return { label:"Adecuada", color:"#4ade80", bg:"rgba(74,222,128,.1)" };
    return { label:"Intensa", color:"#fbbf24", bg:"rgba(251,191,36,.1)" };
  }

  function renderDashboard(data) {
    const temp     = data.temperatura    ?? "--";
    const humSuelo = data.humedad_suelo  ?? "--";
    const luz      = data.luz            ?? "--";
    const ts = data.timestamp ? new Date(data.timestamp * 1000).toLocaleString("es-CO") : "Ahora";

    const stT  = typeof temp     === "number" ? getTemp(temp)         : { label:"—", color:"#6b7c6b", bg:"transparent" };
    const stHS = typeof humSuelo === "number" ? getHumSuelo(humSuelo) : { label:"—", color:"#6b7c6b", bg:"transparent" };
    const stL  = typeof luz      === "number" ? getLuz(luz)           : { label:"—", color:"#6b7c6b", bg:"transparent" };

    const pTemp = typeof temp     === "number" ? Math.min((temp/50)*100, 100) : 0;
    const pHS   = typeof humSuelo === "number" ? Math.min(humSuelo, 100)      : 0;
    const pLuz  = typeof luz      === "number" ? Math.min((luz/1200)*100,100) : 0;

    document.getElementById("statusDot").className = "dot online";
    document.getElementById("statusText").textContent = "En línea";

    document.getElementById("app").innerHTML = `
      <div class="section-label">// lecturas en tiempo real</div>
      <div class="info-bar">
        <div>Última actualización: <span>${ts}</span></div>
        <div>Sensor: <span>ESP32-S3</span></div>
      </div>
      <div class="cards">
        <div class="card">
          <div class="card-accent" style="background:${stT.color}"></div>
          <div class="card-header">
            <div class="card-label">Temperatura</div>
            <div class="card-icon">🌡</div>
          </div>
          <div class="card-value" style="color:${stT.color}">${typeof temp==="number"?temp.toFixed(1):"--"}<span class="card-unit">°C</span></div>
          <div class="gauge-wrap">
            <div class="gauge-track"><div class="gauge-fill" style="width:${pTemp}%;background:${stT.color}"></div></div>
            <div class="gauge-labels"><span>0°</span><span>25°</span><span>50°</span></div>
          </div>
          <div class="status-row"><div class="status-pill" style="background:${stT.bg};color:${stT.color}">${stT.label}</div></div>
          <div class="card-desc">Rango óptimo: 15°C – 28°C</div>
        </div>

        <div class="card">
          <div class="card-accent" style="background:${stHS.color}"></div>
          <div class="card-header">
            <div class="card-label">Humedad del suelo</div>
            <div class="card-icon">🌱</div>
          </div>
          <div class="card-value" style="color:${stHS.color}">${typeof humSuelo==="number"?humSuelo.toFixed(0):"--"}<span class="card-unit">%</span></div>
          <div class="gauge-wrap">
            <div class="gauge-track"><div class="gauge-fill" style="width:${pHS}%;background:${stHS.color}"></div></div>
            <div class="gauge-labels"><span>0%</span><span>50%</span><span>100%</span></div>
          </div>
          <div class="status-row"><div class="status-pill" style="background:${stHS.bg};color:${stHS.color}">${stHS.label}</div></div>
          <div class="card-desc">Sensor capacitivo v1.2</div>
        </div>

        <div class="card">
          <div class="card-accent" style="background:${stL.color}"></div>
          <div class="card-header">
            <div class="card-label">Nivel de luz</div>
            <div class="card-icon">☀️</div>
          </div>
          <div class="card-value" style="color:${stL.color}">${typeof luz==="number"?luz:"--"}<span class="card-unit" style="font-size:13px">lux</span></div>
          <div class="gauge-wrap">
            <div class="gauge-track"><div class="gauge-fill" style="width:${pLuz}%;background:${stL.color}"></div></div>
            <div class="gauge-labels"><span>0</span><span>600</span><span>1200</span></div>
          </div>
          <div class="status-row"><div class="status-pill" style="background:${stL.bg};color:${stL.color}">${stL.label}</div></div>
          <div class="card-desc">Sensor LDR 5mm 5506</div>
        </div>
      </div>

      <div class="section-label">// resumen de estado</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="summary-color" style="background:${stT.color}"></div><div><div class="summary-name">Temperatura</div><div class="summary-val" style="color:${stT.color}">${stT.label}</div></div></div>
        <div class="summary-item"><div class="summary-color" style="background:${stHS.color}"></div><div><div class="summary-name">Humedad del suelo</div><div class="summary-val" style="color:${stHS.color}">${stHS.label}</div></div></div>
        <div class="summary-item"><div class="summary-color" style="background:${stL.color}"></div><div><div class="summary-name">Nivel de luz</div><div class="summary-val" style="color:${stL.color}">${stL.label}</div></div></div>
      </div>
    `;
  }

  function renderError(msg) {
    document.getElementById("statusDot").className = "dot";
    document.getElementById("statusText").textContent = "Sin conexión";
    document.getElementById("app").innerHTML = `<div class="error-msg">⚠️ Error al conectar con Firebase<br><small style="opacity:.6;margin-top:6px;display:block">${msg}</small></div>`;
  }

  try {
    const dataRef = ref(db, "ecoplant");
    onValue(dataRef, snapshot => {
      const data = snapshot.val();
      if (data) renderDashboard(data);
      else renderError("No se encontraron datos en /ecoplant.");
    }, error => renderError(error.message));
  } catch(e) { renderError(e.message); }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
